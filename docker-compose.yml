services:
  redis:
    image: redis:7-alpine
    container_name: futaverse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis

volumes:
  redis_data: